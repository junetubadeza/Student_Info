{% extends "base.html" %}
{% block title %}Change Password - Student{% endblock %}
{% block nav_items %}
<li class="nav-item"><a class="nav-link" href="{{ url_for('student.dashboard') }}"><i class="bi bi-speedometer2"></i> Dashboard</a></li>
<li class="nav-item"><a class="nav-link" href="{{ url_for('student.profile') }}"><i class="bi bi-person"></i> Profile</a></li>
<li class="nav-item"><a class="nav-link" href="{{ url_for('student.grades_view') }}"><i class="bi bi-card-checklist"></i> Grades</a></li>
<li class="nav-item"><a class="nav-link" href="{{ url_for('student.schedule_view') }}"><i class="bi bi-calendar3"></i> Schedule</a></li>
<li class="nav-item"><a class="nav-link active" href="{{ url_for('student.change_password') }}"><i class="bi bi-key"></i> Password</a></li>
{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-5">
        <div class="card">
            <div class="card-header bg-primary text-white">
                <h5 class="mb-0"><i class="bi bi-key"></i> Change Password</h5>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">Current Password *</label>
                        <input type="password" class="form-control" name="current_password" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">New Password *</label>
                        <input type="password" class="form-control" name="new_password" required minlength="6">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Confirm New Password *</label>
                        <input type="password" class="form-control" name="confirm_password" required minlength="6">
                    </div>
                    <button type="submit" class="btn btn-primary w-100"><i class="bi bi-check-lg"></i> Update Password</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
